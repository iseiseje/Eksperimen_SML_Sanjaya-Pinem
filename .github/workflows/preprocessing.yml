name: Automated Data Preprocessing Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'preprocessing/automate_*.py'
      - 'dataset_raw/**'

permissions:
  contents: write

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pandas scikit-learn
        
    - name: Execute Automation Script
      run: |
        cd preprocessing
        python automate_Sanjaya-Pinem.py
        
    - name: Commit and Push Processed Data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        
        if [[ -n "$(git status --porcelain)" ]]; then
          git commit -m "auto: update preprocessed dataset [GitHub Actions]"
          git push
        else
          echo "No changes detected in processed data."
        fi
